---
stages:
  - lint
  - test
  - build
  - release

include:
  - component: $CI_SERVER_FQDN/ptrck-sh/templates/ci-templates/base@0.22.2
    inputs:
      runner_tags: [homelab]
  - component: $CI_SERVER_FQDN/ptrck-sh/templates/ci-templates/pre-commit@0.22.2
  - component: $CI_SERVER_FQDN/ptrck-sh/templates/ci-templates/security@0.22.2
  - component: $CI_SERVER_FQDN/ptrck-sh/templates/ci-templates/alint@0.22.2
  - component: $CI_SERVER_FQDN/ptrck-sh/templates/ci-templates/go@0.22.2
    inputs:
      gofmt_dirs: "main.go internal/"

# Override go:build to:
#   - import GPG key for signing on tagged releases
#   - cap parallelism (runner fork limit causes "resource temporarily unavailable")
go:build:
  stage: build
  image:
    name: goreleaser/goreleaser:v2.17.0
    entrypoint: [""]
  variables:
    GITLAB_TOKEN: $CI_JOB_TOKEN
    GIT_DEPTH: 0
  before_script:
    - |
      if [ -n "${GPG_PRIVATE_KEY}" ]; then
        echo "${GPG_PRIVATE_KEY}" | gpg --batch --import
      fi
  script:
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        goreleaser release --clean --parallelism 4
      else
        goreleaser release --snapshot --clean --skip=sign --parallelism 4
      fi
  artifacts:
    paths:
      - dist/
    expire_in: 7 days
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

release:github:
  stage: release
  image: alpine:3.24
  needs:
    - job: go:build
      artifacts: true
  variables:
    GH_TOKEN: $GITHUB_TOKEN
  before_script:
    - apk add --no-cache github-cli
  script:
    - gh release create "$CI_COMMIT_TAG"
      dist/terraform-provider-plane_*_SHA256SUMS
      dist/terraform-provider-plane_*_SHA256SUMS.sig
      dist/terraform-provider-plane_*_manifest.json
      dist/terraform-provider-plane_*.zip
      --repo ptrck-sh/terraform-provider-plane
      --title "$CI_COMMIT_TAG"
      --notes ""
  rules:
    - if: $CI_COMMIT_TAG

# Acceptance tests hit a live Plane instance and need PLANE_HOST / PLANE_API_KEY.
# They are never run unauthenticated on every push. Manual trigger only, and
# the test helper skips gracefully when the env vars are unset.
go:acc:
  extends: .go
  stage: test
  variables:
    TF_ACC: "1"
  script:
    - go test ./internal/provider/... -run 'TestAcc' -v -timeout 30m
  rules:
    - if: $CI_COMMIT_BRANCH
      when: manual
      allow_failure: true
